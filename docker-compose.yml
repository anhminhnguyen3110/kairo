services:
  fe:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://app:3000
      NEXT_PUBLIC_SITE_URL: http://localhost
      PORT: '3000'
    ports:
      - '${FE_PORT:-3000}:3000'
    networks:
      - ii-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ii-network:
    external: true
